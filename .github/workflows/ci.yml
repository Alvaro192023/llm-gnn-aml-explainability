name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn pytest ruff

      - name: Syntax check (all modules parse)
        run: python -m compileall codigo

      - name: Lint (critical errors only)
        run: ruff check --select E9,F63,F7,F82 codigo tests

      - name: Run unit tests
        run: pytest -q
